name: CI

on:
  push:
    branches:
      - main
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  check-and-build:
    name: Check and build
    runs-on: macos-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Show Swift version
        run: swift --version

      - name: Run core checks
        run: swift run DdayCoreChecks

      - name: Build Swift package
        run: swift build

      - name: Build app bundle
        run: ./scripts/build_app.sh

      - name: Validate app Info.plist
        run: plutil -lint build/Dday.app/Contents/Info.plist
