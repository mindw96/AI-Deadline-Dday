name: Release

on:
  push:
    tags:
      - "v*.*.*"
  workflow_dispatch:
    inputs:
      tag:
        description: "Existing tag to release, for example v0.1.1"
        required: true
        type: string

permissions:
  contents: write

jobs:
  release:
    name: Build and publish release
    runs-on: macos-latest

    steps:
      - name: Resolve release tag
        id: release_tag
        env:
          INPUT_TAG: ${{ inputs.tag }}
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "tag=${INPUT_TAG}" >> "$GITHUB_OUTPUT"
          else
            echo "tag=${GITHUB_REF_NAME}" >> "$GITHUB_OUTPUT"
          fi

      - name: Check for existing release
        id: existing_release
        env:
          GH_TOKEN: ${{ github.token }}
          RELEASE_TAG: ${{ steps.release_tag.outputs.tag }}
        run: |
          if gh release view "$RELEASE_TAG" --repo "$GITHUB_REPOSITORY" >/dev/null 2>&1; then
            echo "exists=true" >> "$GITHUB_OUTPUT"
            echo "Release $RELEASE_TAG already exists; skipping automated packaging."
          else
            echo "exists=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Check out repository
        if: steps.existing_release.outputs.exists != 'true'
        uses: actions/checkout@v6
        with:
          ref: ${{ steps.release_tag.outputs.tag }}

      - name: Show Swift version
        if: steps.existing_release.outputs.exists != 'true'
        run: swift --version

      - name: Run core checks
        if: steps.existing_release.outputs.exists != 'true'
        run: |
          swift build --product DdayCoreChecks
          .build/debug/DdayCoreChecks

      - name: Build app bundle
        if: steps.existing_release.outputs.exists != 'true'
        run: ./scripts/build_app.sh

      - name: Package app
        if: steps.existing_release.outputs.exists != 'true'
        env:
          RELEASE_TAG: ${{ steps.release_tag.outputs.tag }}
        run: ./scripts/package_release.sh "${RELEASE_TAG}"

      - name: Publish GitHub Release
        if: steps.existing_release.outputs.exists != 'true'
        env:
          GH_TOKEN: ${{ github.token }}
          RELEASE_TAG: ${{ steps.release_tag.outputs.tag }}
        run: |
          tag="${RELEASE_TAG}"
          if gh release view "$tag" --repo "$GITHUB_REPOSITORY" >/dev/null 2>&1; then
            echo "Release $tag already exists; leaving existing assets untouched."
            exit 0
          fi

          gh release create "$tag" \
            "dist/Dday-${tag}.zip" \
            "dist/Dday-${tag}.zip.sha256" \
            "dist/Dday-${tag}.dmg" \
            "dist/Dday-${tag}.dmg.sha256" \
            --title "Dday ${tag}" \
            --generate-notes \
            --repo "$GITHUB_REPOSITORY" \
            --verify-tag
