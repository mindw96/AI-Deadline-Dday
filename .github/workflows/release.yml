name: Release Validation

on:
  push:
    tags:
      - "v*.*.*"
  workflow_dispatch:
    inputs:
      tag:
        description: "Existing tag to validate, for example v1.1.1"
        required: true
        type: string

permissions:
  contents: read

jobs:
  validate:
    name: Validate release source
    runs-on: macos-latest

    steps:
      - name: Resolve release tag
        id: release_tag
        env:
          INPUT_TAG: ${{ inputs.tag }}
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "tag=${INPUT_TAG}" >> "$GITHUB_OUTPUT"
          else
            echo "tag=${GITHUB_REF_NAME}" >> "$GITHUB_OUTPUT"
          fi

      - name: Check out repository
        uses: actions/checkout@v6
        with:
          ref: ${{ steps.release_tag.outputs.tag }}

      - name: Show Swift version
        run: swift --version

      - name: Run core checks
        run: |
          swift build --product DdayCoreChecks
          .build/debug/DdayCoreChecks

      - name: Build app bundle without publishing
        env:
          RELEASE_TAG: ${{ steps.release_tag.outputs.tag }}
        run: |
          version="${RELEASE_TAG#v}"
          APP_VERSION="$version" ./scripts/build_app.sh

      - name: Validate app Info.plist
        env:
          RELEASE_TAG: ${{ steps.release_tag.outputs.tag }}
        run: |
          version="${RELEASE_TAG#v}"
          actual="$(/usr/libexec/PlistBuddy -c 'Print :CFBundleShortVersionString' build/Dday.app/Contents/Info.plist)"
          if [ "$actual" != "$version" ]; then
            echo "Expected CFBundleShortVersionString $version, got $actual" >&2
            exit 1
          fi

          plutil -lint build/Dday.app/Contents/Info.plist
